services:
  db:
    image: postgres:16-alpine
    container_name: pf_g1_back_django_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pf_g1_django
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pf_g1_django"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
